<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CPIS360 Lab Assignment 1</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-marker preset="hiro">

      <a-box
        position="-1 0.5 0"
        scale="0.5 0.5 0.5"
        color="#ef4444"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
      </a-box>
      
      <a-cylinder
        position="0 0.5 0"
        radius="0.22"
        height="0.8"
        color="#3b82f6"
        animation="property: position; to: 0 0.8 0; dir: alternate; loop: true; dur: 1200">
      </a-cylinder>
      
      <a-cone
        position="1 0.5 0"
        radius-bottom="0.25"
        height="0.7"
        color="#facc15"
        animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 1000">
      </a-cone>
      
      <a-text
        value="Moayad Ali Alghamdi"
        position="0 1.3 0"
        align="center"
        color="#FFFFFF"
        width="4">
      </a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
